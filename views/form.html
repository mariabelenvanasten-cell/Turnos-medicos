<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Obras y Servicios</title>

    <style>
        body {
            font-family: Arial;
            background-color: #ffe4ec;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        input, textarea, button {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
        }

        button {
            background-color: #ff4d88;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<form id="form">
    <h2>Nuevo Servicio</h2>

    <input type="text" id="nombre" placeholder="Nombre del servicio" required>
    <textarea id="descripcion" placeholder="Descripción" required></textarea>
    <input type="text" id="tipo" placeholder="Tipo de obra" required>

    <button type="submit">Guardar</button>
</form>

<script>
document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nombre = document.getElementById("nombre").value;
    const descripcion = document.getElementById("descripcion").value;
    const tipo = document.getElementById("tipo").value;

    try {
        const res = await fetch("/prog3-clase2/public/index.php/items", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nombre,
                descripcion,
                tipo
            })
        });

        const data = await res.json();

        alert(JSON.stringify(data, null, 2));

    } catch (error) {
        alert("Error al conectar con el servidor");
    }
});
</script>

</body>
</html>
